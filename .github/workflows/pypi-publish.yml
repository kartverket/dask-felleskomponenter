name: Publish Python 🐍 distribution 📦 to PyPI and TestPyPI

on:
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish to PyPI"
        required: true
        default: true
        type: boolean
      publish_testpypi:
        description: "Publish to TestPyPI"
        required: true
        default: false
        type: boolean
      version:
        description: "Version-number to be published. Setting this input-value will update the version-field in pyproject.toml, and the changes will be pushed to Github. If omitted, the value from pyproject.toml will be used."
        required: false
        type: string

permissions:
  id-token: write # Required for Octo STS

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest
    environment: pypi-publish
    steps:
      - uses: octo-sts/action@6177b4481c00308b3839969c3eca88c96a91775f # v1.0.0
        id: octo-sts
        with:
          scope: kartverket/dask-felleskomponenter
          identity: "dask-felleskomponenter"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          fetch-depth: 0

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Bump version in pyproject.toml
        if: ${{ github.event.inputs.version != '' }}
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ github.event.inputs.version }}\"/" pyproject.toml
          git config --local user.name "GitHub Actions"
          git config --local user.email "noreply@kartverket.no"
          if [[ -n $(git status --porcelain) ]]; then
            git commit -am "Bump dask-felleskomponenter PyPI package version to ${{ github.event.inputs.version }}"
            git push
          else
            echo "Ingen endringer detektert. Skipper commit og push."
          fi

      - name: Build the package
        run: poetry build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish 🚀 to PyPI
    if: fromJson(github.event.inputs.publish_pypi)
    needs:
      - build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/dask-felleskomponenter

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  publish-to-testpypi:
    name: Publish 🚀 to TestPyPI
    if: fromJson(github.event.inputs.publish_testpypi)
    needs:
      - build
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/dask-felleskomponenter

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution 📦 to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true
